<h1>Roblox API Checker 1</h1>

<form id="apiForm">
  <label for="username">Username:</label>
  <input type="text" id="username"><br><br>

  <label for="userid">User ID:</label>
  <input type="text" id="userid"><br><br>

  <input type="submit" value="Submit">
</form>

<pre id="dataOutput"></pre>

<script>
const form = document.getElementById('apiForm');
const output = document.getElementById('dataOutput');

form.addEventListener('submit', async (e) => {
  e.preventDefault();

  const username = document.getElementById('username').value.trim();
  let userid = document.getElementById('userid').value.trim();

  try {
    // 🚫 require at least one input
    if (!username && !userid) {
      output.textContent = "Enter username or user ID";
      return;
    }

    /* =========================
       STEP 1: username → userId
       (NO proxy needed)
    ========================== */
    if (username && !userid) {
      const res = await fetch("https://users.roblox.com/v1/usernames/users", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          usernames: [username],
          excludeBannedUsers: false
        })
      });

      const data = await res.json();

      if (!data.data || data.data.length === 0) {
        throw new Error("User not found");
      }

      userid = data.data[0].id;
    }

    /* =========================
       STEP 2: userId → user data
       (USES proxy for GitHub Pages)
    ========================== */
    const userRes = await fetch(
      "https://api.allorigins.win/raw?url=" +
      encodeURIComponent(`https://users.roblox.com/v1/users/${userid}`)
    );

    if (!userRes.ok) {
      throw new Error("Failed to fetch user data");
    }

    const userData = await userRes.json();

    /* =========================
       OUTPUT RAW JSON
    ========================== */
    output.textContent = JSON.stringify(userData, null, 2);

  } catch (error) {
    output.textContent = "Error: " + error.message;
  }
});
</script>
